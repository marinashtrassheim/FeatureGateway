# Два Redis на хосте:
#   redis          — фичи (pers_*), порты 6379:6379
#   redis-cache    — cache-aside ответа POST /features, порт хоста 6382
#
# Именованные volumes — данные не пропадают после `docker compose down`
# (если не выполнять `docker compose down -v`).
#
#   docker compose up -d

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  redis-cache:
    image: redis:7-alpine
    ports:
      - "6382:6379"
    volumes:
      - redis-cache-data:/data

volumes:
  redis-data:
  redis-cache-data:
